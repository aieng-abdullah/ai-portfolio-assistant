<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      color: #1a1a1a;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .chat-header-text h3 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .chat-header-text p {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #4F46E5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      align-self: flex-start;
      background: #f3f4f6;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }
    .message.bot a {
      color: #4F46E5;
      text-decoration: underline;
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .chat-input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input-area input:focus {
      border-color: #4F46E5;
    }
    .chat-input-area button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #4F46E5;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .chat-input-area button:hover {
      background: #4338CA;
    }
    .chat-input-area button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 10px 14px;
      background: #f3f4f6;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #9ca3af;
      border-radius: 50%;
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <img id="chat-logo" src="" alt="" style="display:none;">
    <div class="chat-header-text">
      <h3 id="chat-title">Portfolio Assistant</h3>
      <p id="chat-subtitle">Ask me anything</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="typing-indicator" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off">
    <button id="sendBtn" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <script>
    (function() {
      var slug = window.location.pathname.split('/widget/')[1];
      if (!slug) return;

      var params = new URLSearchParams(window.location.search);
      var customGreeting = params.get('greeting') || '';

      var messagesEl = document.getElementById('messages');
      var inputEl = document.getElementById('userInput');
      var sendBtn = document.getElementById('sendBtn');
      var typingEl = document.getElementById('typing');
      var sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

      var apiBase = window.location.origin;

      // Load config
      fetch(apiBase + '/api/widget/' + slug + '/config')
        .then(function(r) { return r.json(); })
        .then(function(config) {
          document.getElementById('chat-title').textContent = config.name || 'Portfolio Assistant';
          var theme = config.theme || {};
          document.getElementById('chat-subtitle').textContent = theme.chatSubtitle || 'Ask me anything';
          if (theme.chatTitle) document.getElementById('chat-title').textContent = theme.chatTitle;
          if (theme.logoUrl) {
            var logo = document.getElementById('chat-logo');
            logo.src = theme.logoUrl;
            logo.style.display = 'block';
          }
          if (theme.primaryColor) {
            document.querySelector('.chat-input-area button').style.background = theme.primaryColor;
            document.querySelector('.message.user').style.background = theme.primaryColor;
          }

          var greeting = customGreeting || (config.personality && config.personality.greeting) || theme.welcomeMessage || "Hi! Ask me about my work or book a meeting.";
          addMessage(greeting, 'bot');
        })
        .catch(function() {
          addMessage("Hi! Ask me about my work or book a meeting.", 'bot');
        });

      function addMessage(text, type) {
        var div = document.createElement('div');
        div.className = 'message ' + type;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function sendMessage() {
        var text = inputEl.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        inputEl.value = '';
        sendBtn.disabled = true;
        typingEl.style.display = 'flex';
        messagesEl.scrollTop = messagesEl.scrollHeight;

        fetch(apiBase + '/api/chat/' + slug, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: sessionId, message: text })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          addMessage(data.response || "Sorry, I couldn't process that.", 'bot');
        })
        .catch(function() {
          addMessage("Sorry, something went wrong. Please try again.", 'bot');
        })
        .finally(function() {
          typingEl.style.display = 'none';
          sendBtn.disabled = false;
          inputEl.focus();
        });
      }

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage();
      });
      inputEl.focus();
    })();
  </script>
</body>
</html>
